<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StudyOS Pro</title>

<style>
body {
  margin:0;
  font-family: -apple-system, sans-serif;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#ffe4e1,#fffacd);
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#111;
  color:white;
  padding:20px;
}
.sidebar h2 { color:#ff69b4; }
.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button.main-btn {
  background:#ff69b4;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

/* PROGRESS */
.progress-bar {
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}
.progress-fill {
  height:100%;
  background:#ff69b4;
  width:0%;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>StudyOS</h2>
  <button onclick="show('dashboard')">🏠 Dashboard</button>
  <button onclick="show('plan')">📚 Study Plan</button>
  <button onclick="show('workspace')">🧠 Brainstorm</button>
  <button onclick="show('quiz')">🧪 Quiz</button>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="card">
    <h2>🎯 Today's Mission</h2>
    <p id="mission">Stay consistent. Small wins daily.</p>

    <h3>🔥 Streak: <span id="streak">1</span> days</h3>

    <div class="progress-bar">
      <div id="progress" class="progress-fill"></div>
    </div>

    <button class="main-btn" onclick="completeTask()">Mark Task Done</button>
  </div>

  <!-- STUDY PLAN -->
  <div id="plan" class="card" style="display:none;">
    <h2>AI Study Plan</h2>

    <input id="level" placeholder="Your level">
    <input id="topics" placeholder="Topics">
    <textarea id="questions" placeholder="Weaknesses"></textarea>

    <button class="main-btn" onclick="generatePlan()">Generate Plan</button>
    <pre id="planOutput"></pre>
  </div>

  <!-- WORKSPACE -->
  <div id="workspace" class="card" style="display:none;">
    <h2>Brainstorm Workspace</h2>

    <textarea id="notes" placeholder="Your ideas..."></textarea>
    <button class="main-btn" onclick="expandIdea()">✨ Expand with AI</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="card" style="display:none;">
    <h2>AI Quiz</h2>

    <input id="quizTopic" placeholder="Topic">
    <button class="main-btn" onclick="generateQuiz()">Generate Quiz</button>

    <pre id="quizOutput"></pre>
  </div>

</div>

<script>
// NAVIGATION
function show(section){
  document.querySelectorAll('.card').forEach(c=>c.style.display='none');
  document.getElementById(section).style.display='block';
}

// STREAK SYSTEM
let streak = localStorage.getItem("streak") || 1;
document.getElementById("streak").innerText = streak;

function completeTask(){
  streak++;
  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = streak;

  let progress = Math.min(streak * 10, 100);
  document.getElementById("progress").style.width = progress + "%";
}

// NOTES SAVE
const notes = document.getElementById("notes");
notes.value = localStorage.getItem("notes") || "";

notes.addEventListener("input", ()=>{
  localStorage.setItem("notes", notes.value);
});

// AI CALLS
async function generatePlan(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level: level.value,
      topics: topics.value,
      questions: questions.value
    })
  });

  const data = await res.json();
  document.getElementById("planOutput").innerText = data.plan || data.error;
}

async function expandIdea(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level:"general",
      topics: notes.value,
      questions:"Expand this into structured notes"
    })
  });

  const data = await res.json();
  notes.value = data.plan;
}

async function generateQuiz(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level:"general",
      topics: document.getElementById("quizTopic").value,
      questions:"Create a quiz with answers"
    })
  });

  const data = await res.json();
  document.getElementById("quizOutput").innerText = data.plan;
}
</script>

</body>
</html>
