<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StudyOS</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f7;
  display:flex;
}

/* Sidebar */
.sidebar {
  width:220px;
  height:100vh;
  background:#ffffff;
  border-right:1px solid #eee;
  padding:20px;
}

.sidebar h2 {
  font-weight:600;
}

.nav {
  margin-top:20px;
}

.nav div {
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.nav div:hover {
  background:#f2f2f2;
}

/* Main */
.main {
  flex:1;
  padding:40px;
}

/* Cards */
.card {
  background:white;
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

/* Inputs */
input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* Buttons */
button {
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#0071e3;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  opacity:0.9;
}

/* Output */
pre {
  margin-top:15px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>StudyOS</h2>

  <div class="nav">
    <div onclick="show('dashboard')">Dashboard</div>
    <div onclick="show('plan')">Study Plan</div>
    <div onclick="show('workspace')">Brainstorm</div>
    <div onclick="show('quiz')">Quiz</div>
  </div>
</div>

<div class="main">

  <div id="dashboard" class="card">
    <h2>Welcome back</h2>
    <p>Stay consistent. Small progress daily.</p>
  </div>

  <div id="plan" class="card" style="display:none;">
    <h2>AI Study Plan</h2>

    <input id="level" placeholder="Your level">
    <input id="topics" placeholder="Topics">
    <textarea id="questions" placeholder="Struggles"></textarea>

    <button onclick="generatePlan()">Generate</button>
    <pre id="planOutput"></pre>
  </div>

  <div id="workspace" class="card" style="display:none;">
    <h2>Brainstorm</h2>

    <textarea id="notes" placeholder="Write ideas..."></textarea>
    <button onclick="expandIdea()">Expand Idea</button>
  </div>

  <div id="quiz" class="card" style="display:none;">
    <h2>Quiz</h2>

    <input id="quizTopic" placeholder="Topic">
    <button onclick="generateQuiz()">Generate Quiz</button>

    <pre id="quizOutput"></pre>
  </div>

</div>

<script>
// NAVIGATION
function show(id){
  document.querySelectorAll('.card').forEach(c=>c.style.display='none');
  document.getElementById(id).style.display='block';
}

// SAVE NOTES
const notes = document.getElementById("notes");
notes.value = localStorage.getItem("notes") || "";

notes.addEventListener("input", ()=>{
  localStorage.setItem("notes", notes.value);
});

// AI FUNCTIONS
async function generatePlan(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level: level.value,
      topics: topics.value,
      questions: questions.value
    })
  });

  const data = await res.json();
  document.getElementById("planOutput").innerText = data.plan || data.error;
}

async function expandIdea(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level:"general",
      topics: notes.value,
      questions:"Expand this into structured notes"
    })
  });

  const data = await res.json();
  notes.value = data.plan;
}

async function generateQuiz(){
  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level:"general",
      topics: document.getElementById("quizTopic").value,
      questions:"Create quiz with answers"
    })
  });

  const data = await res.json();
  document.getElementById("quizOutput").innerText = data.plan;
}
</script>

</body>
</html>
