<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StudyLingo</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #58cc02;
  margin:0;
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* STATS */
.stats {
  display:flex;
  justify-content:space-around;
  margin-bottom:20px;
}

.stat {
  background:#46a302;
  padding:10px 20px;
  border-radius:20px;
}

/* PATH */
.path {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* LESSON BUTTONS */
.lesson {
  width:80px;
  height:80px;
  border-radius:50%;
  background:#89e219;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 5px 0 #4caf00;
  transition:0.1s;
}

.lesson:hover {
  transform: translateY(-3px);
}

.lesson.locked {
  background:#ccc;
  box-shadow:none;
  cursor:not-allowed;
}

/* QUIZ POPUP */
.popup {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  color:black;
  padding:20px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  display:none;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#58cc02;
  color:white;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📚 StudyLingo</div>

<div class="stats">
  <div class="stat">🔥 <span id="streak">1</span></div>
  <div class="stat">⭐ <span id="xp">0</span> XP</div>
</div>

<div class="path">
  <div class="lesson" onclick="startLesson('Math')">➕</div>
  <div class="lesson locked">🔒</div>
  <div class="lesson locked">🔒</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3 id="question">Loading...</h3>
  <input id="answer" placeholder="Your answer">
  <button onclick="submitAnswer()">Submit</button>
</div>

<script>
let xp = localStorage.getItem("xp") || 0;
let streak = localStorage.getItem("streak") || 1;

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

let correctAnswer = "";

// START LESSON
async function startLesson(subject){
  document.getElementById("popup").style.display = "block";

  const res = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      level:"student",
      topics: subject,
      questions:"Create ONE simple quiz question with answer"
    })
  });

  const data = await res.json();

  document.getElementById("question").innerText = data.plan;

  // (simple hack: answer not extracted yet)
  correctAnswer = ""; 
}

// SUBMIT
function submitAnswer(){
  xp = parseInt(xp) + 10;
  streak = parseInt(streak) + 1;

  localStorage.setItem("xp", xp);
  localStorage.setItem("streak", streak);

  document.getElementById("xp").innerText = xp;
  document.getElementById("streak").innerText = streak;

  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
