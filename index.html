<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyBee 🐶🐝</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- GENERAL --- */
body{margin:0;font-family:'Roboto',sans-serif;background:#fff9db;overflow-x:hidden;}
.title{font-size:40px;font-weight:700;margin:20px;color:#5a5a5a;text-align:center;}
.stats{display:flex;justify-content:center;gap:20px;margin-top:10px;}
.stat{background:white;padding:12px 22px;border-radius:25px;box-shadow:0 8px 25px rgba(0,0,0,0.12);font-weight:bold;transition:0.3s;}
.stat:hover{transform:scale(1.05);}
#progress-bar{width:80%;height:22px;background:#eee;border-radius:12px;margin:15px auto;overflow:hidden;}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd43b,#fff066);transition:width 0.8s;}
.lesson-container{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-top:20px;}
.lesson-card{width:160px;height:160px;background:#fff9db;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 10px 25px rgba(0,0,0,0.18);cursor:pointer;font-weight:bold;color:#5a5a5a;font-size:18px;transition:0.3s;}
.lesson-card:hover{transform:scale(1.08);}
.lesson-card.completed{background:#ffd43b;color:white;}
.popup{position:fixed;bottom:0;left:0;right:0;background:white;padding:25px;border-radius:20px 20px 0 0;max-height:85%;overflow-y:auto;box-shadow:0 -5px 25px rgba(0,0,0,0.18);z-index:100;transform:translateY(100%);opacity:0;transition:all 0.5s ease;}
.popup.show{transform:translateY(0);opacity:1;}
button{padding:12px 20px;border:none;border-radius:20px;background:#ffd43b;font-weight:bold;margin-top:10px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.15);transition:0.3s;}
button:hover{transform:scale(1.05);}
input{width:90%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ddd;}
#dog{position:absolute;bottom:50px;left:0;width:80px;z-index:2;transition:left 0.05s linear;}
#bee{position:absolute;top:50px;left:300px;width:50px;z-index:1;transition:left 0.05s linear;}
#draw-toolbar{position:fixed;top:80px;right:20px;background:rgba(255,255,255,0.95);border-radius:15px;padding:10px;box-shadow:0 5px 20px rgba(0,0,0,0.25);display:flex;gap:10px;z-index:10;flex-direction: column;}
#draw-canvas{border-radius:15px;margin:20px auto;display:block;box-shadow:0 12px 25px rgba(0,0,0,0.2);background:white;}
.sticky-note{position:absolute;background:#fff8a3;padding:12px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.22);cursor:move;font-weight:bold;}
.xp-pop{position:fixed;top:20px;right:20px;background:#ffd43b;padding:12px;border-radius:12px;animation:pop 1s forwards;font-weight:bold;font-size:16px;}
@keyframes pop{0%{opacity:0;transform:translateY(20px);}50%{opacity:1;}100%{opacity:0;transform:translateY(-20px);}}
</style>
</head>
<body>

<div class="title">StudyBee 🐶🐝</div>
<div class="stats">
  <div class="stat">🔥 Streak: <span id="streak">0</span></div>
  <div class="stat">⭐ XP: <span id="xp">0</span></div>
  <div class="stat">🏆 Level: <span id="level">0</span></div>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div class="lesson-container">
    <div class="lesson-card" onclick="startLesson(this)">Lesson 1</div>
    <div class="lesson-card" onclick="startLesson(this)">Lesson 2</div>
    <div class="lesson-card" onclick="startLesson(this)">Lesson 3</div>
    <div class="lesson-card" onclick="startLesson(this)">Lesson 4</div>
</div>

<div class="popup" id="popup">
  <h2>Mini Quiz</h2>
  <div id="quiz-container"></div>
  <button onclick="nextQuestion()">Next Question</button>
</div>

<button onclick="shareStreak()">Share your streak!</button>

<img src="https://upload.wikimedia.org/wikipedia/en/5/50/Snoopy_icon.png" id="dog" alt="Dog Mascot">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Bee_icon.png" id="bee" alt="Bumblebee">

<div id="draw-toolbar">
  <input type="color" id="pen-color" value="#ffd43b" title="Pen Color">
  <input type="range" id="pen-size" min="2" max="15" value="4" title="Pen Size">
  <button onclick="toggleErase()">Erase</button>
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="addStickyNote()">Add Sticky Note</button>
</div>

<canvas id="draw-canvas" width="900" height="500"></canvas>

<script>
/* ==== XP / LEVEL ==== */
let xp=parseInt(localStorage.getItem("xp")||0);
let streak=parseInt(localStorage.getItem("streak")||0);
let level=Math.floor(xp/100);
let studentInfo=JSON.parse(localStorage.getItem("studentInfo")||"null");
function updateUI(){
  document.getElementById("xp").innerText=xp;
  document.getElementById("streak").innerText=streak;
  document.getElementById("level").innerText=level;
  document.getElementById("progress-fill").style.width=Math.min((xp%100),100)+"%";
}
updateUI();
function xpPop(amount){
  let el=document.createElement("div"); el.className="xp-pop"; el.innerText="+"+amount+" XP";
  document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
}

/* ==== DOG & BEE ANIMATION ==== */
let dog=document.getElementById("dog"), bee=document.getElementById("bee");
let dogSpeed=3, beeX=300, beeY=50;
function animateDogBee(){
  let maxWidth=window.innerWidth-100, maxHeight=window.innerHeight-150;
  setInterval(()=>{
    beeX+=(Math.random()-0.5)*12; beeY+=(Math.random()-0.5)*6;
    if(beeX>maxWidth) beeX=0; if(beeX<0) beeX=maxWidth;
    if(beeY>maxHeight) beeY=maxHeight; if(beeY<0) beeY=0;
    bee.style.left=beeX+"px"; bee.style.top=beeY+"px";
    let dogPos=parseFloat(dog.style.left)||0;
    if(dogPos<beeX-50) dog.style.left=dogPos+dogSpeed+"px";
    if(dogPos>beeX-50) dog.style.left=dogPos-dogSpeed+"px";
  },40);
}
animateDogBee();

/* ==== QUIZ / AI ==== */
let quiz=[], current=0, lessonCard=null;
async function startLesson(card){
  lessonCard=card;
  if(!studentInfo){
    const levelInput=prompt("Enter your year/level:");
    const topics=prompt("Enter topics to study:");
    const questions=prompt("Any specific questions? (optional)");
    studentInfo={level:levelInput, topics, questions};
    localStorage.setItem("studentInfo", JSON.stringify(studentInfo));
  }
  document.getElementById("popup").classList.add("show");
  try{
    let res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(studentInfo)
    });
    let data=await res.json();
    quiz=data.plan.split(/\d+\.\s/).filter(q=>q).map(q=>{
      let parts=q.split("A:");
      return {q:parts[0].trim(), a:parts[1]?.trim()||""};
    });
    current=0; showQuestion();
  }catch(e){ document.getElementById("quiz-container").innerText="Failed to load quiz.";}
}
function showQuestion(){
  if(current>=quiz.length){ document.getElementById("quiz-container").innerHTML="<b>Quiz complete! 🎉</b>"; return; }
  let q=quiz[current];
  document.getElementById("quiz-container").innerHTML=`<div><b>${q.q}</b></div>
    <input id="answer-input" placeholder="Your answer here">`;
}
function nextQuestion(){
  let ans=document.getElementById("answer-input").value.trim().toLowerCase();
  let correct=quiz[current].a.toLowerCase();
  if(ans===correct){ xp+=10; streak++; level=Math.floor(xp/100); xpPop(10); updateUI(); alert("✅ Correct!"); }
  else alert("❌ Incorrect. Correct: "+quiz[current].a);
  current++; showQuestion();
  if(current>=quiz.length && lessonCard){ lessonCard.classList.add("completed"); }
}

/* ==== DRAW & STICKY ==== */
const canvas=document.getElementById("draw-canvas"); const ctx=canvas.getContext("2d"); let drawing=false, erase=false;
const penColor=document.getElementById("pen-color"); const penSize=document.getElementById("pen-size");
canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mouseleave",()=>drawing=false);
canvas.addEventListener("mousemove",(e)=>{
  if(!drawing) return;
  ctx.strokeStyle=erase?"#fff":penColor.value;
  ctx.lineWidth=penSize.value; ctx.lineCap="round"; ctx.lineJoin="round";
  if(!ctx.lastX) { ctx.lastX=e.offsetX; ctx.lastY=e.offsetY; return; }
  ctx.beginPath(); ctx.moveTo(ctx.lastX,ctx.lastY); ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();
  ctx.lastX=e.offsetX; ctx.lastY=e.offsetY;
});
function toggleErase(){ erase=!erase; }
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.lastX=0; ctx.lastY=0; }
function addStickyNote(){
  const note=document.createElement("div"); note.className="sticky-note"; note.contentEditable=true; note.innerText="Type here...";
  note.style.left=Math.random()*600+"px"; note.style.top=Math.random()*300+"px"; document.body.appendChild(note);
  makeDraggable(note);
}
function makeDraggable(note){
  let shiftX, shiftY;
  note.onmousedown=function(e){
    shiftX=e.clientX-note.getBoundingClientRect().left;
    shiftY=e.clientY-note.getBoundingClientRect().top;
    function moveAt(e){ note.style.left=e.clientX-shiftX+'px'; note.style.top=e.clientY-shiftY+'px'; }
    document.addEventListener('mousemove',moveAt);
    document.onmouseup=function(){ document.removeEventListener('mousemove',moveAt); document.onmouseup=null; }
    note.ondragstart=()=>false;
  }
}

/* ==== SHARE / VIRAL ==== */
function shareStreak(){ const url=encodeURIComponent(window.location.href); const text=encodeURIComponent(`I just got a ${streak}-day streak on StudyBee 🐶! Can you beat me?`); window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`);}

/* ==== DAILY REMINDERS ==== */
if(Notification.permission!=="granted"){ Notification.requestPermission(); }
function dailyReminder(){ if(Notification.permission==="granted") new Notification("StudyBee Reminder 🐝","Time to complete your lessons today!"); }
setInterval(dailyReminder,24*60*60*1000); // 24h
</script>
</body>
</html>
