<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Study OS</title>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#fdfbfb,#ebedee);
  margin:0;
}

.app {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#111;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2 { color:#ffb6c1; }

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #eee;
}

button.main-btn {
  background:#ff8fab;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

pre {
  white-space: pre-wrap;
}

/* CANVAS */
canvas {
  border:1px solid #ddd;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>Study OS</h2>
<button onclick="show('plan')">📖 Plan</button>
<button onclick="show('quiz')">🧪 Quiz</button>
<button onclick="show('ask')">❓ Ask</button>
<button onclick="show('draw')">🎨 Draw</button>
<button onclick="enableNotifications()">🔔 Reminder</button>
</div>

<div class="main">

<!-- PLAN -->
<div id="plan" class="card">
<h3>Smart Study Planner</h3>
<input id="name" placeholder="Your name">
<input id="level" placeholder="Year / Level">
<input id="subjects" placeholder="Subjects">
<input id="weakness" placeholder="Weakness">
<input id="time" placeholder="Time available">

<button class="main-btn" onclick="generatePlan()">Generate Plan</button>

<pre id="output"></pre>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
<h3>AI Quiz</h3>
<button class="main-btn" onclick="generateQuiz()">Generate Quiz</button>
<pre id="quizOutput"></pre>
</div>

<!-- ASK -->
<div id="ask" class="card" style="display:none;">
<h3>Ask Anything</h3>
<input id="questionBox">
<button class="main-btn" onclick="askQuestion()">Ask</button>
<pre id="answer"></pre>
</div>

<!-- DRAW -->
<div id="draw" class="card" style="display:none;">
<h3>Draw / Brainstorm</h3>
<canvas id="canvas" width="400" height="250"></canvas>
</div>

</div>
</div>

<script>

// NAVIGATION
function show(section){
 document.querySelectorAll(".card").forEach(c=>c.style.display="none");
 document.getElementById(section).style.display="block";
}

// AI CALLS
async function generatePlan(){
 const res = await fetch("/api/generate",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    type:"plan",
    name:document.getElementById("name").value,
    level:document.getElementById("level").value,
    subjects:document.getElementById("subjects").value,
    weakness:document.getElementById("weakness").value,
    time:document.getElementById("time").value
  })
 });

 const data = await res.json();
 document.getElementById("output").innerText = data.text;
}

async function generateQuiz(){
 const res = await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"quiz"})});
 const data = await res.json();
 document.getElementById("quizOutput").innerText = data.text;
}

async function askQuestion(){
 const q=document.getElementById("questionBox").value;
 const res = await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"question",q})});
 const data = await res.json();
 document.getElementById("answer").innerText = data.text;
}

// DRAW
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",(e)=>{
 if(!drawing) return;
 ctx.fillRect(e.offsetX,e.offsetY,3,3);
});

// NOTIFICATIONS
function enableNotifications(){
 Notification.requestPermission().then(()=>{
  new Notification("Time to study 📚");
 });
}
</script>

</body>
</html>
